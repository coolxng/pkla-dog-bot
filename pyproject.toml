[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = [
  "E501",
]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
check_untyped_defs = false

[[tool.mypy.overrides]]
module = "bot"
# discord.py stubs and dynamic voice-client APIs are not fully typed yet.
disable_error_code = ["attr-defined", "arg-type", "assignment", "misc", "union-attr"]

